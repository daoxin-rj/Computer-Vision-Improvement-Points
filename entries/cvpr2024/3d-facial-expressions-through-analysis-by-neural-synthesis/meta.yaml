summary_one_line: "SMIRK replaces differentiable-rendering supervision with analysis-by-neural-synthesis and adds cycle-based expression consistency to recover subtle and asymmetric facial expressions."
summary_one_line_zh: "SMIRK 用分析-神经合成监督替代传统可微渲染监督，并加入循环式表情一致性约束，以更好重建细微和非对称表情。"
